        schema:
          type: integer
          format: int32
      - name: month
        in: query
        required: true
        schema:
          type: integer
          format: int32
      - name: siteId
        in: query
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/CalendarResponse'
components:
  schemas:
    ReservationRequest:
      type: object
      properties:
        customerName:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        siteNumber:
          type: string
        phoneNumber:
          type: string
        numberOfPeople:
          type: integer
          format: int32
        carNumber:
          type: string
        requests:
          type: string
    SiteResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        siteNumber:
          type: string
        description:
          type: string
        maxPeople:
          type: integer
          format: int32
        size:
          type: string
        hasElectricity:
          type: boolean
        toiletDistance:
          type: integer
          format: int32
        facilities:
          type: string
        rules:
          type: string
    SiteAvailabilityResponse:
      type: object
      properties:
        siteId:
          type: integer
          format: int64
        siteNumber:
          type: string
        size:
          type: string
        hasElectricity:
          type: boolean
        date:
          type: string
          format: date
        available:
          type: boolean
        maxPeople:
          type: integer
          format: int32
        description:
          type: string
    ReservationResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        customerName:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        siteNumber:
          type: string
        phoneNumber:
          type: string
        status:
          type: string
        confirmationCode:
          type: string
        createdAt:
          type: string
          format: date-time
    CalendarResponse:
      type: object
      properties:
        year:
          type: integer
          format: int32
        month:
          type: integer
          format: int32
        siteId:
          type: integer
          format: int64
        siteNumber:
          type: string
        days:
          type: array
          items:
            $ref: '#/components/schemas/DayStatus'
        summary:
          type: object
          additionalProperties:
            type: integer
            format: int32
    DayStatus:
      type: object
      properties:
        date:
          type: string
          format: date
        available:
          type: boolean
        customerName:
          type: string
        reservationId:
          type: integer
          format: int64
