  /api/sites/{siteNumber}/availability:
    get:
      tags:
      - site-controller
      operationId: checkAvailability
      parameters:
      - name: siteNumber
        in: path
        required: true
        schema:
          type: string
      - name: date
        in: query
        required: true
        schema:
          type: string
          format: date
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
                additionalProperties:
                  type: object
  /api/sites/{siteId}:
    get:
      tags:
      - site-controller
      operationId: getSiteDetail
      parameters:
      - name: siteId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/SiteResponse'
  /api/sites/search:
    get:
      tags:
      - site-controller
      operationId: searchSites
      parameters:
      - name: startDate
        in: query
        required: true
        schema:
          type: string
          format: date
      - name: endDate
        in: query
        required: true
        schema:
          type: string
          format: date
      - name: size
        in: query
        required: false
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SiteAvailabilityResponse'
  /api/sites/available:
    get:
      tags:
      - site-controller
      operationId: getAvailableSites
      parameters:
      - name: date
        in: query
        required: true
        schema:
          type: string
          format: date
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SiteAvailabilityResponse'
  /api/reservations/my:
    get:
      tags:
      - reservation-controller
      operationId: getMyReservations
      parameters:
      - name: name
