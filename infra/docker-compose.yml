x-common-environment: &common-env
  SPRING_PROFILES_ACTIVE: local
  SERVER_PORT: 8080

x-common-healthcheck: &common-healthcheck
  test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
  interval: 10s
  timeout: 5s
  retries: 10
  start_period: 30s

networks:
  atdd-net:
    name: atdd-net
    external: true

services:
  # Kiosk Service
  kiosk:
    build:
      context: ../repos/atdd-camping-kiosk
      dockerfile: ../../infra/dockerfiles/Dockerfile
    container_name: kiosk
    ports:
      - "18081:8080"
    environment:
      <<: *common-env
      SPRING_DATASOURCE_URL: jdbc:mysql://atdd-db:3306/atdd
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: secret
      KIOSK_ADMIN_BASE_URL: http://admin:8080
    networks:
      - atdd-net
    healthcheck: *common-healthcheck

  # Admin Service
  admin:
    build:
      context: ../repos/atdd-camping-admin
      dockerfile: ../../infra/dockerfiles/Dockerfile
    container_name: admin
    ports:
      - "18082:8080"
    environment: *common-env
    networks:
      - atdd-net
    healthcheck: *common-healthcheck

  # Reservation Service
  reservation:
    build:
      context: ../repos/atdd-camping-reservation
      dockerfile: ../../infra/dockerfiles/Dockerfile
    container_name: reservation
    ports:
      - "18083:8080"
    environment: *common-env
    networks:
      - atdd-net
    healthcheck: *common-healthcheck

  # Payments Mock Service (WireMock)
  payments-mock:
    image: wiremock/wiremock:3.3.1
    container_name: payments-mock
    ports:
      - "18084:8080"
    volumes:
      - ../wiremock/mappings:/home/wiremock/mappings
      - ../wiremock/__files:/home/wiremock/__files
    command:
      - --global-response-templating
      - --verbose
    networks:
      - atdd-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/__admin/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
