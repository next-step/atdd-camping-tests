networks:
  atdd-net:
    external: true

x-db-env: &db_env
  SPRING_DATASOURCE_URL: "jdbc:mysql://atdd-db:3306/atdd?useSSL=false&characterEncoding=utf8&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul"
  SPRING_DATASOURCE_USERNAME: "root"
  SPRING_DATASOURCE_PASSWORD: "secret"

x-wait-db: &wait_db_cmd >
  sh -c "until nc -z atdd-db 3306; do echo 'waiting db...'; sleep 2; done;
         java $JAVA_OPTS -jar /app/app.jar"

services:
  kiosk:
    build:
      context: ..
      dockerfile: dockerfiles/Dockerfile-kiosk
    container_name: kiosk-app
    ports:
      - "8080:8080"
    networks:
      - atdd-net
    environment:
      JAVA_OPTS: "-Xms256m -Xmx512m"
      KIOSK_ADMIN_BASE_URL: "http://admin:8080"
      KIOSK_ADMIN_AUTH_LOGIN_PATH: "/auth/login"
      KIOSK_ADMIN_AUTH_USERNAME: "admin"
      KIOSK_ADMIN_AUTH_PASSWORD: "admin123"
      KIOSK_ADMIN_AUTH_COOKIE_NAME: "AUTH_TOKEN"
      RESERVATION_BASE_URL: "http://reservation:8080"
      KIOSK_PAYMENT_BASE_URL: "http://payments-mock:8080"
      KIOSK_PAYMENT_SECRET_KEY: "test_sk_dummy"
      <<: *db_env
    command: *wait_db_cmd

  admin:
    build:
      context: ..
      dockerfile: dockerfiles/Dockerfile-admin
    container_name: admin-app
    ports:
      - "8081:8080"
    networks:
      - atdd-net
    environment:
      JAVA_OPTS: "-Xms256m -Xmx512m"
      RESERVATION_BASE_URL: "http://reservation:8080"
      KIOSK_BASE_URL: "http://kiosk:8080"
      <<: *db_env
    command: *wait_db_cmd

  reservation:
    build:
      context: ..
      dockerfile: dockerfiles/Dockerfile-reservation
    container_name: reservation-app
    ports:
      - "8082:8080"
    networks:
      - atdd-net
    environment:
      JAVA_OPTS: "-Xms256m -Xmx512m"
      ADMIN_BASE_URL: "http://admin:8080"
      KIOSK_BASE_URL: "http://kiosk:8080"
      <<: *db_env
    command: *wait_db_cmd

  payments-mock:
    image: wiremock/wiremock:3.13.1
    container_name: payments-mock
    networks: [ atdd-net ]
    ports:
      - "9090:8080"
    volumes:
      - ./wiremock:/home/wiremock
    command:
      - "--global-response-templating"
      - "--verbose"

