services:
  kiosk:
    build:
      context: ..
      dockerfile: infra/dockerfiles/Dockerfile-kiosk
    image: camping-kiosk:latest
    container_name: camping-kiosk
    ports:
      - "8080:8080"
    environment:
      # Payment service configuration
      - PAYMENTS_SECRET_KEY=test_sk_dummy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - kiosk-network

networks:
  kiosk-network:
    driver: bridge
    name: camping-kiosk-network
