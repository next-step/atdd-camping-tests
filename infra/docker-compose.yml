services:
  # === WireMock (결제 Mock) ===
  payments-mock:
    image: wiremock/wiremock:3.5.4
    container_name: atdd-payments-mock
    ports:
      - "18090:8080"
    volumes:
      - ./wiremock:/home/wiremock
    command:
      - "--global-response-templating"
      - "--verbose"
    networks:
      - atdd-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/__admin/health"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
  # === Kiosk 서비스 ===
  kiosk:
    build:
      context: ../repos/atdd-camping-kiosk
      dockerfile: ../../infra/dockerfiles/Dockerfile-kiosk
    container_name: atdd-kiosk
    ports:
      - "18081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - SERVER_PORT=8080
      - KIOSK_ADMIN_BASE_URL=http://atdd-admin:8080
      - KIOSK_PAYMENT_BASE_URL=http://atdd-payments-mock:8080
      - PAYMENTS_SECRET_KEY=test_sk_dummy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      admin:
        condition: service_healthy
      payments-mock:
        condition: service_healthy
    networks:
      - atdd-net

  # === Admin 서비스 ===
  admin:
    build:
      context: ../repos/atdd-camping-admin
      dockerfile: ../../infra/dockerfiles/Dockerfile-admin
    container_name: atdd-admin
    ports:
      - "18082:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - atdd-net

  # === Reservation 서비스 ===
  reservation:
    build:
      context: ../repos/atdd-camping-reservation
      dockerfile: ../../infra/dockerfiles/Dockerfile-reservation
    container_name: atdd-reservation
    ports:
      - "18083:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - atdd-net

networks:
  atdd-net:
    name: atdd-net
    external: true  # 인프라 compose에서 생성한 네트워크 사용