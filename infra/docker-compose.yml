name: atdd-app

networks:
  atdd-net:
    name: atdd-net
    external: true

x-common-spring-env: &common-spring-env
  SPRING_PROFILES_ACTIVE: docker
  SPRING_DATASOURCE_USERNAME: sa
  SPRING_DATASOURCE_PASSWORD: ""
  SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver
  SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect

services:
  # Kiosk 서비스
  kiosk:
    build:
      context: ..
      dockerfile: infra/dockerfiles/Dockerfile-kiosk
    container_name: atdd-kiosk
    ports:
      - "18081:8080"
    networks:
      - atdd-net
    environment:
      <<: *common-spring-env
      SPRING_DATASOURCE_URL: jdbc:h2:mem:kioskdb
      KIOSK_ADMIN_BASE_URL: http://admin:8080

  # Admin 서비스
  admin:
    build:
      context: ..
      dockerfile: infra/dockerfiles/Dockerfile-admin
    container_name: atdd-admin
    ports:
      - "18082:8080"
    networks:
      - atdd-net
    environment:
      <<: *common-spring-env
      SPRING_DATASOURCE_URL: jdbc:h2:mem:admindb

  # Reservation 서비스
  reservation:
    build:
      context: ..
      dockerfile: infra/dockerfiles/Dockerfile-reservation
    container_name: atdd-reservation
    ports:
      - "18083:8080"
    networks:
      - atdd-net
    environment:
      <<: *common-spring-env
      SPRING_DATASOURCE_URL: jdbc:h2:mem:reservationdb