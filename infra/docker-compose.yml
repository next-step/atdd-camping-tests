networks:
  atdd-net:
    name: atdd-net
    external: true

services:
  kiosk:
    build:
      context: ..
      dockerfile: infra/dockerfiles/Dockerfile-kiosk
    ports:
      - "18081:8080"
    networks:
      - atdd-net

  admin:
    build:
      context: ..
      dockerfile: infra/dockerfiles/Dockerfile-admin
    ports:
      - "18082:8080"
    networks:
      - atdd-net

  reservation:
    build:
      context: ..
      dockerfile: infra/dockerfiles/Dockerfile-reservation
    ports:
      - "18083:8080"
    networks:
      - atdd-net
