networks:
  atdd-net:
    external: true

services:
  kiosk:
    networks:
      - atdd-net
    build:
      context: ../repos/kiosk
      dockerfile: ../../infra/dockerfiles/Dockerfile-kiosk
    ports:
      - "18080:8080"
    container_name: kiosk
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - SERVER_PORT=8080
      - KIOSK_ADMIN_BASE_URL=http://admin:8081

  admin:
    networks:
      - atdd-net
    build:
      context: ../repos/admin
      dockerfile: ../../infra/dockerfiles/Dockerfile-admin
    ports:
      - "18081:8081"
    container_name: admin
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - SERVER_PORT=8081
      - SPRING_DATASOURCE_URL=jdbc:mysql://atdd-db:3306/atdd
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=secret
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.MySQLDialect
      - SPRING_JPA_HIBERNATE_DDL_AUTO=none
      - SPRING_SQL_INIT_MODE=never

  reservation:
    networks:
      - atdd-net
    build:
      context: ../repos/reservation
      dockerfile: ../../infra/dockerfiles/Dockerfile-reservation
    ports:
      - "18082:8082"
    container_name: reservation
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - SERVER_PORT=8082
      - SPRING_DATASOURCE_URL=jdbc:mysql://atdd-db:3306/atdd
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=secret
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.MySQLDialect
      - SPRING_JPA_HIBERNATE_DDL_AUTO=none
      - SPRING_SQL_INIT_MODE=never

  payments-mock:
    image: wiremock/wiremock:3.5.2
    container_name: payments-mock
    networks:
      - atdd-net
    ports:
      - "18083:8080"
    volumes:
      - ./wiremock/mappings:/home/wiremock/mappings
    command: "--verbose"
