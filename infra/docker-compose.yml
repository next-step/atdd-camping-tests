services:
  admin:
    build:
      context: ../repos/atdd-camping-admin
      dockerfile: ../../infra/dockerfiles/Dockerfile-admin
    ports:
      - "18080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - SERVER_PORT=8080
      - JWT_SECRET=change-this-dev-secret-key-please
      - JWT_EXPIRATION_MINUTES=30
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin123
      # DB 설정
      - SPRING_DATASOURCE_URL=jdbc:mysql://atdd-db:${DB_PORT}/${DB_NAME}?characterEncoding=UTF-8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
    networks:
      - atdd-net

  reservation:
    build:
      context: ../repos/atdd-camping-reservation
      dockerfile: ../../infra/dockerfiles/Dockerfile-reservation
    ports:
      - "18082:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - SERVER_PORT=8080
      # DB 설정
      - SPRING_DATASOURCE_URL=jdbc:mysql://atdd-db:${DB_PORT}/${DB_NAME}?characterEncoding=UTF-8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
    networks:
      - atdd-net

  kiosk:
    build:
      context: ../repos/atdd-camping-kiosk
      dockerfile: ../../infra/dockerfiles/Dockerfile-kiosk
    ports:
      - "18081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - SERVER_PORT=8080
      # Admin 서버 연결 설정
      - KIOSK_ADMIN_BASE_URL=http://admin:8080
      - KIOSK_ADMIN_AUTH_USERNAME=admin
      - KIOSK_ADMIN_AUTH_PASSWORD=admin123
      - KIOSK_ADMIN_AUTH_LOGIN_PATH=/auth/login
      - KIOSK_ADMIN_AUTH_COOKIE_NAME=AUTH_TOKEN
      # Payment 서버 연결 설정
      - KIOSK_PAYMENT_BASE_URL=http://payments:9090
      - KIOSK_PAYMENT_SECRET_KEY=test_sk_dummy
      - KIOSK_DISCOUNT_PERCENT=10
    depends_on:
      admin:
        condition: service_started
    networks:
      - atdd-net

networks:
  atdd-net:
    name: atdd-net
    external: true
