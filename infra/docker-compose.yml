networks:
  atdd-net:
    name: atdd-net
    external: false

services:
  # Kiosk Service
  kiosk-db:
    image: mysql:8.0
    container_name: kiosk-db
    environment:
      - MYSQL_ROOT_PASSWORD=secret
      - MYSQL_DATABASE=kiosk
      - MYSQL_ROOT_HOST=%
    ports:
      - "13306:3306"
    networks:
      - atdd-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-psecret"]
      interval: 5s
      timeout: 3s
      retries: 20
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]

  kiosk:
    build:
      context: ../repos/atdd-camping-kiosk
      dockerfile: ../../infra/dockerfiles/Dockerfile-kiosk
    container_name: kiosk
    ports:
      - "18081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:mysql://kiosk-db:3306/kiosk
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=secret
    networks:
      - atdd-net
    depends_on:
      kiosk-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Admin Service
  admin:
    build:
      context: ../repos/atdd-camping-admin
      dockerfile: ../../infra/dockerfiles/Dockerfile-admin
    container_name: admin
    ports:
      - "18082:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - SERVER_PORT=8080
    networks:
      - atdd-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Reservation Service
  reservation:
    build:
      context: ../repos/atdd-camping-reservation
      dockerfile: ../../infra/dockerfiles/Dockerfile-reservation
    container_name: reservation
    ports:
      - "18083:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - SERVER_PORT=8080
    networks:
      - atdd-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
