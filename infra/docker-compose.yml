name: atdd-app

networks:
  atdd-net:
    name: atdd-net
    external: true

x-common-spring-env: &common-spring-env
  SPRING_PROFILES_ACTIVE: docker
  SPRING_DATASOURCE_USERNAME: sa
  SPRING_DATASOURCE_PASSWORD: ""
  SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver
  SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect
  SPRING_DATASOURCE_URL: jdbc:h2:mem:admindb

services:
  # Kiosk 서비스
  kiosk:
    build:
      context: ..
      dockerfile: infra/dockerfiles/Dockerfile-svc
      args:
        SERVICE_NAME: kiosk
    container_name: atdd-kiosk
    ports:
      - "18081:8080"
    networks:
      - atdd-net
    environment:
      <<: *common-spring-env
      KIOSK_ADMIN_BASE_URL: http://admin:8080
      KIOSK_PAYMENT_BASE_URL: http://payments-mock:8080

  # Admin 서비스
  admin:
    build:
      context: ..
      dockerfile: infra/dockerfiles/Dockerfile-svc
      args:
        SERVICE_NAME: admin
    container_name: atdd-admin
    ports:
      - "18082:8080"
    networks:
      - atdd-net
    environment:
      <<: *common-spring-env

  # Reservation 서비스
  reservation:
    build:
      context: ..
      dockerfile: infra/dockerfiles/Dockerfile-svc
      args:
        SERVICE_NAME: reservation
    container_name: atdd-reservation
    ports:
      - "18083:8080"
    networks:
      - atdd-net
    environment:
      <<: *common-spring-env

  # Payments Mock 서비스
  payments-mock:
    image: wiremock/wiremock:latest
    container_name: payments-mock
    ports:
      - "18084:8080"
    volumes:
      - ./wiremock/mappings:/home/wiremock/mappings
      - ./wiremock/__files:/home/wiremock/__files
    command: ["--global-response-templating", "--verbose"]
    networks:
      - atdd-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/__admin/health"]
      interval: 5s
      timeout: 3s
      retries: 10