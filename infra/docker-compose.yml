name: atdd

networks:
  atdd-net:
    name: atdd-net
    external: true # 이미 존재하는 네트워크 '사용'

services:
  kiosk:
    build:
      context: ../repo/atdd-camping-kiosk
      dockerfile: ../../dockerfiles/Dockerfile-kiosk
      args:
        - JAR_FILE=build/libs/*.jar
    image: atdd/kiosk:latest
    container_name: atdd-kiosk
    ports:
      - "18081:8081"
    environment:
      - KIOSK_PORT=18081
      - KIOSK_BASE_URL=http://localhost:18081
      - KIOSK_ADMIN_BASE_URL=http://atdd-admin:8082
    networks:
      - atdd-net

  admin:
    build:
      context: ../repo/atdd-camping-admin
      dockerfile: ../../dockerfiles/Dockerfile-admin
      args:
        - JAR_FILE=build/libs/*.jar
    image: atdd/admin:latest
    container_name: atdd-admin
    ports:
      - "18082:8082"
    environment:
      - ADMIN_PORT=18082
      - ADMIN_BASE_URL=http://localhost:18082
      - SPRING_DATASOURCE_URL=jdbc:mysql://atdd-db:3306/camping?characterEncoding=UTF-8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root1234
    networks:
      - atdd-net

  reservation:
    build:
      context: ../repo/atdd-camping-reservation
      dockerfile: ../../dockerfiles/Dockerfile-reservation
      args:
        - JAR_FILE=build/libs/*.jar
    image: atdd/reservation:latest
    container_name: atdd-reservation
    ports:
      - "18083:8083"
    environment:
      - RESERVATION_PORT=18083
      - RESERVATION_BASE_URL=http://localhost:18083
      - SPRING_DATASOURCE_URL=jdbc:mysql://atdd-db:3306/camping?characterEncoding=UTF-8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root1234
    networks:
      - atdd-net
