networks:
  atdd-net:
    name: atdd-net
    external: true

services:
  kiosk:
    build:
      context: ..
      dockerfile: infra/dockerfiles/Dockerfile-kiosk
    ports:
      - "18081:8080"
    networks:
      - atdd-net
    environment:
      - KIOSK_ADMIN_BASE_URL=http://admin:8080

  admin:
    build:
      context: ..
      dockerfile: infra/dockerfiles/Dockerfile-admin
    ports:
      - "18082:8080"
    networks:
      - atdd-net
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://atdd-db:3306/atdd
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=secret

  reservation:
    build:
      context: ..
      dockerfile: infra/dockerfiles/Dockerfile-reservation
    ports:
      - "18083:8080"
    networks:
      - atdd-net
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://atdd-db:3306/atdd
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=secret
