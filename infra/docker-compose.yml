services:
  kiosk:
    build:
      context: ..
      dockerfile: infra/dockerfiles/Dockerfile-kiosk
    image: camping-kiosk:latest
    container_name: camping-kiosk
    ports:
      - "8080:8080"
    environment:
      # Payment service configuration
      - PAYMENTS_SECRET_KEY=test_sk_dummy
    restart: unless-stopped
    networks:
      - camping-network

  admin:
    build:
      context: ..
      dockerfile: infra/dockerfiles/Dockerfile-admin
    image: camping-admin:latest
    container_name: camping-admin
    ports:
      - "8081:8081"
    environment:
      # Admin service configuration
      - SPRING_PROFILES_ACTIVE=docker
    restart: unless-stopped
    networks:
      - camping-network

  reservation:
    build:
      context: ..
      dockerfile: infra/dockerfiles/Dockerfile-reservation
    image: camping-reservation:latest
    container_name: camping-reservation
    ports:
      - "8082:8082"
    environment:
      # Reservation service configuration
      - SPRING_PROFILES_ACTIVE=docker
    restart: unless-stopped
    networks:
      - camping-network

networks:
  camping-network:
    driver: bridge
    name: camping-network
