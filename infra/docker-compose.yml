name: atdd-kiosk

networks:
  atdd-net:
    name: atdd-net
    external: false

services:
  kiosk:
    build:
      context: ../repo/atdd-camping-kiosk
      dockerfile: ../../dockerfiles/Dockerfile-kiosk
      args:
        - JAR_FILE=build/libs/*.jar
    image: atdd/kiosk:latest
    container_name: atdd-kiosk
    ports:
      - "${KIOSK_PORT:-18081}:8080"
    environment:
      - KIOSK_PORT=${KIOSK_PORT:-18081}
      - KIOSK_BASE_URL=${KIOSK_BASE_URL:-http://localhost:${KIOSK_PORT:-18081}}
      - JAVA_OPTS=-Dkiosk.base-url=${KIOSK_BASE_URL:-http://localhost:${KIOSK_PORT:-18081}}
    networks:
      - atdd-net
